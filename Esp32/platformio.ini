[platformio]
default_envs = m5stack-stamp-c3
data_dir = src/data

; Determinar Versión de Firmware
; X.Y.Z
; (X) versión mayor
; (Y) versión menor
; (Z) revisión
; Alpha, Beta, RC (Alpha es una versión inestable - Beta una versión mas estable que Alpha - RC (Release Candidate) )
; v1.0.Alpha - v1.0.a0
; v2.1.Beta - v1.0.b1
; v3.0-RC - v3.0.rc3
; Fecha: Año-mes-día
; v1.0.0a-20211102

[common]
version = -D BUILD_TAG="V1.0.a0-Build-20260311"
lib_deps = 
    bblanchon/ArduinoJson @ ^6.18.5
    knolleary/PubSubClient @ ^2.8
    paulstoffregen/Time @ ^1.6.1
    ;me-no-dev/ESP Async WebServer@^1.2.3
    ottowinter/ESPAsyncWebServer-esphome@^2.1.0
    lvgl/lvgl @ ^8.3.11
    bodmer/TFT_eSPI @ ^2.5.43
    kosme/arduinoFFT @ ^2.0.4
 
; https://www.calculadoraconversor.com/hexadecimal-a-decimal/
; Tabla de Particiones personalizadas 3985408 bytes
;# Name,   Type, SubType, Offset,  Size, Flags
;nvs,      data, nvs,     0x9000,   0x5000,   - 20480 bytes
;otadata,  data, ota,     0xe000,   0x2000,   - 8192 bytes
;ota_0,    app,  ota_0,   0x10000,  0x1E0000, - 1966080 bytes
;ota_1,    app,  ota_1,   0x1F0000, 0x1E0000, - 1966080 bytes
;spiffs,   data, spiffs,  0x3D0000, 0x6000,   - 24576 bytes

[env:m5stack-stamp-c3]
platform = espressif32
board = esp32-c3-devkitm-1

;[env:esp32dev]
;platform = espressif32
;board = esp32dev


framework = arduino
; Microcontroller
board_build.mcu = esp32c3
board_build.variant = esp32c3
board_build.f_cpu = 160000000L
board_build.f_flash = 40000000L
board_build.flash_mode = dio
board_build.partitions = huge_app.csv
;;;;;;;;;;;;;;;;;;;;;;;;;;
lib_deps =
    ${common.lib_deps}
monitor_speed = 115200
build_flags = 
    ${common.version}
    -D LV_CONF_SKIP
    -D LV_ADDR_CUSTOM=1
    -D LV_USE_FS_SPIFFS=1
    -D LV_FS_SPIFFS_LETTER='S'
    -D USER_SETUP_LOADED=1
    -D GC9A01_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240
    -D TFT_MOSI=7
    -D TFT_SCLK=6
    -D TFT_CS=10
    -D TFT_DC=2
    -D TFT_RST=1
    -D TFT_BL=3
    -D SPI_FREQUENCY=40000000
;upload_port = /dev/ttyACM1
;monitor_port = /dev/ttyACM1


